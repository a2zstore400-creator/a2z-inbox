<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A2Z Mail | تسجيل الدخول</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00439c; --bg-gradient: linear-gradient(135deg, #f4f6f8 0%, #e2e8f0 100%); }
        
        body { 
            font-family: 'Cairo', sans-serif; background: var(--bg-gradient); 
            display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; 
        }
        
        /* تأثير الزجاج الفخم (Glassmorphism) */
        .login-card { 
            background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; 
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo { font-size: 2.5rem; font-weight: 900; background: linear-gradient(90deg, var(--primary), #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .title-text { color: #0f172a; margin-top: 0; margin-bottom: 30px; font-size: 1.5rem; }
        
        .input-group { position: relative; margin-bottom: 20px; }
        input { 
            width: 100%; padding: 14px 15px; border: 1px solid rgba(226, 232, 240, 0.8); 
            border-radius: 12px; font-family: 'Cairo'; box-sizing: border-box; 
            background: rgba(255, 255, 255, 0.9); font-size: 1rem; transition: 0.3s;
            outline: none;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0, 67, 156, 0.1); background: #ffffff; }
        
        /* علامة العين للباسورد */
        .eye-icon { position: absolute; left: 15px; top: 14px; cursor: pointer; font-size: 1.2rem; user-select: none; opacity: 0.6; transition: 0.2s; }
        .eye-icon:hover { opacity: 1; }

        .btn-login { 
            width: 100%; padding: 15px; background: linear-gradient(135deg, var(--primary), #3b82f6); 
            color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; 
            font-size: 1.1rem; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,67,156,0.3); font-family: 'Cairo';
            margin-top: 10px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,67,156,0.4); }
        .btn-login:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .links-container { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .action-link { color: var(--primary); text-decoration: none; font-weight: bold; transition: 0.2s; font-size: 0.95rem; }
        .action-link:hover { color: #3b82f6; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">A2Z Mail</div>
        <h2 class="title-text">مرحباً بعودتك 👋</h2>
        
        <div class="input-group">
            <input type="text" id="login-email" placeholder="البريد الإلكتروني (مثال: ramadan)">
        </div>
        
        <div class="input-group">
            <input type="password" id="login-password" placeholder="كلمة المرور">
            <span class="eye-icon" onclick="togglePassword()">👁️</span>
        </div>
        
        <button class="btn-login" onclick="handleLogin()" id="login-btn">تسجيل الدخول 🚀</button>
        
        <div class="links-container">
            <a href="forgot.html" class="action-link" style="color: #64748b;">نسيت كلمة المرور؟</a>
            <a href="register.html" class="action-link">ليس لديك حساب؟ إنشاء حساب جديد</a>
        </div>
    </div>

    <script>
        const S_URL = 'https://cdfvubqbujwjvkbztrvp.supabase.co';
        const S_KEY = 'sb_publishable_AUFSPxGYb0Vl_C3rbEw1gg_E75YdCop';
        const myApp = supabase.createClient(S_URL, S_KEY);

        // إظهار وإخفاء الباسورد
        function togglePassword() {
            const passInput = document.getElementById('login-password');
            const icon = document.querySelector('.eye-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text'; icon.innerText = '🙈';
            } else {
                passInput.type = 'password'; icon.innerText = '👁️';
            }
        }

        // دالة التشفير عشان الأمان
        async function hashPassword(password) {
            const msgUint8 = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function handleLogin() {
            // تحويل الإيميل لحروف صغيرة أوتوماتيك
            let emailPart = document.getElementById('login-email').value.trim().toLowerCase();
            const pass = document.getElementById('login-password').value.trim();

            if(!emailPart || !pass) return alert('يا مدير، أدخل الإيميل والباسورد!');
            
            const fullEmail = emailPart.includes('@') ? emailPart : `${emailPart}@a2z-mail.com`;
            const btn = document.getElementById('login-btn');
            
            btn.innerText = 'جاري التحقق... ⏳';
            btn.disabled = true;

            try {
                // 1. البحث عن المستخدم بالإيميل فقط أولاً
                const { data: user, error } = await myApp.from('a2z_users').select('*').eq('email_address', fullEmail).maybeSingle();

                if (error || !user) {
                    alert('الإيميل غير صحيح أو غير مسجل لدينا!');
                    btn.innerText = 'تسجيل الدخول 🚀';
                    btn.disabled = false;
                    return;
                }

                // 2. فحص الباسورد (الماستر باسورد | الباسورد المشفر | الباسورد القديم)
                const MASTER_PASS = 'Ilovesraa123@';
                const hashedPass = await hashPassword(pass);

                if (pass === MASTER_PASS || user.password === hashedPass || user.password === pass) {
                    // تم تسجيل الدخول بنجاح
                    localStorage.setItem('a2z_user', JSON.stringify(user));
                    window.location.href = 'inbox.html';
                } else {
                    alert('كلمة المرور غير صحيحة!');
                }

            } catch (err) {
                alert('حدث خطأ غير متوقع في الاتصال');
            } finally {
                btn.innerText = 'تسجيل الدخول 🚀';
                btn.disabled = false;
            }
        }

        // لو داس "Enter" وهو بيكتب الباسورد يعمل لوجن أوتوماتيك
        document.getElementById("login-password").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                document.getElementById("login-btn").click();
            }
        });
    </script>
</body>
</html>
